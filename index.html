<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biccas Implementation</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <section class="first-slide">
      <header class="navbar">
        <h1 class="logo">Biccas</h1>

        <div class="right-side">
          <nav>
            <ul class="nav-links">
              <li><a href="#">Home</a></li>
              <li><a href="#">Product</a></li>
              <li><a href="#">FAQ</a></li>
              <li><a href="#">Blog</a></li>
              <li><a href="#">About Us</a></li>
            </ul>
          </nav>

          <div class="register">
            <a href="#" class="login">Login</a>
            <button class="signup">Sign Up</button>
          </div>
        </div>
      </header>

      <section class="hero">
        <div class="hero-text">
          <h1>We're here to<br />Increase your<br />Productivity</h1>

          <img src="./images/Vector 32.png" alt="vector" />

          <p>
            Let's make your work more organized and easily using<br />the Taskio
            Dashboard with many of the latest<br />features in managing work
            every day.
          </p>

          <div class="hero-buttons">
            <button class="trial">Try free trial</button>
            <a href="#" class="demo">▶ View Demo</a>
          </div>
        </div>

        <div class="hero-image">
          <img src="./images/Group 138.png" alt="person" />
        </div>
      </section>

      <section class="first-footer">
        <h2>More than 25,000 teams use Collabs</h2>
        <img src="./images/Logo.png" alt="base-logos">
      </section>
    </section>
  </body>
</html>
